<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar Presença</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

input, select, textarea {
  width: 100%;
  margin-bottom: 15px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

textarea {
  resize: none;
  height: 80px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  background: #25D366;
  color: white;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #040435;
}
</style>
  
</head>
<body>

  <div class="container">
    <h1>Confirmar Presença</h1>
    <p>Preencha os dados abaixo para confirmar sua presença no evento</p>

    <form id="rsvpForm">
      <input type="text" id="nome" placeholder="Seu nome" required>

      <select id="status" required>
        <option value="">Você irá comparecer?</option>
        <option value="Sim, estarei presente ">Sim, estarei presente </option>
        <option value="Não poderei comparecer ">Não poderei comparecer </option>
      </select>

      <input type="number" id="convidados" placeholder="Número de convidados (se houver)" min="0">

      <textarea id="mensagem" placeholder="Mensagem opcional"></textarea>

      <button type="submit">Confirmar via WhatsApp</button>
    </form>
  </div>

  <script>
    document.getElementById("rsvpForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const nome = document.getElementById("nome").value;
  const status = document.getElementById("status").value;
  const convidados = document.getElementById("convidados").value;
  const mensagemExtra = document.getElementById("mensagem").value;

  const numeroWhatsApp = "5500000000000"; // 👉 coloque seu número aqui (com DDI + DDD)

  let mensagem = `Olá! Gostaria de confirmar minha presença:\n\n`;
  mensagem += `Nome: ${nome}\n`;
  mensagem += `Presença: ${status}\n`;

  if (convidados) {
    mensagem += `Convidados: ${convidados}\n`;
  }

  if (mensagemExtra) {
    mensagem += `Mensagem: ${mensagemExtra}\n`;
  }

  const url = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensagem)}`;

  window.open(url, "_blank");
});
  </script>
</body>
</html>
